<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0d12">
<title>AIDA - Sun'iy Ong</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0d12;--surface:#13161e;--surface2:#1a1f2b;--surface3:#202638;--border:#252b3a;--border-light:#2e3548;--text:#e4e7ed;--text2:#8a91a5;--text3:#5c6378;--accent:#5b7aff;--accent-hover:#6f8aff;--accent-glow:rgba(91,122,255,0.15);--green:#3ccf7e;--green-dim:rgba(60,207,126,0.12);--red:#f05a5a;--radius:10px;--radius-sm:6px;--sidebar-w:280px;--font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'SF Mono','Fira Code',monospace}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;line-height:1.6}
.layout{display:flex;height:100dvh}
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:50}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.sidebar-header .brand{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px}
.sidebar-header .brand svg{width:18px;height:18px;color:var(--accent);flex-shrink:0}
.sidebar-header .brand span{background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.new-chat-btn{padding:6px 14px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background 0.2s;font-family:var(--font)}
.new-chat-btn:hover{background:var(--accent-hover)}
.chat-list{flex:1;overflow-y:auto;padding:8px}
.chat-list::-webkit-scrollbar{width:3px}
.chat-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.chat-item{padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background 0.15s;margin-bottom:2px;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-item:hover{background:var(--surface2);color:var(--text)}
.chat-item.active{background:var(--accent-glow);color:var(--text);border:1px solid rgba(91,122,255,0.2)}
.chat-item .date{font-size:10px;color:var(--text3);margin-top:2px}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;gap:10px}
.header .title{font-size:14px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.header .status{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;flex-shrink:0}
.header .status .dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;flex-shrink:0}
.header .status .dot.off{background:var(--red)}
.chat-feed{flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth}
.chat-feed::-webkit-scrollbar{width:4px}
.chat-feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;gap:12px;margin-bottom:24px;animation:fadeIn 0.3s ease}
.msg.user{flex-direction:row-reverse}
.msg .avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:600}
.msg.aida .avatar{background:var(--accent-glow);color:var(--accent)}
.msg.user .avatar{background:var(--green-dim);color:var(--green)}
.msg .bubble{max-width:78%;padding:14px 18px;border-radius:12px;font-size:14px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.msg.aida .bubble{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.msg.user .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.msg .bubble pre{background:var(--surface3);padding:14px;border-radius:6px;overflow-x:auto;font-size:13px;margin:10px 0;font-family:var(--mono);line-height:1.4}
.msg .bubble code{background:var(--surface3);padding:2px 6px;border-radius:4px;font-size:13px;font-family:var(--mono)}
.msg .bubble pre code{background:none;padding:0}
.msg .bubble .sources{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px}
.msg .bubble .sources a{color:var(--accent);text-decoration:none;display:block;margin-top:3px}
.msg .bubble .sources a:hover{text-decoration:underline}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;padding:40px;text-align:center}
.welcome .icon{width:56px;height:56px;background:var(--accent-glow);border-radius:16px;display:flex;align-items:center;justify-content:center;color:var(--accent)}
.welcome .icon svg{width:28px;height:28px}
.welcome h1{font-size:22px;font-weight:700}
.welcome p{color:var(--text2);max-width:450px;font-size:14px;line-height:1.7}
.welcome .tips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:8px}
.welcome .tips button{padding:8px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:13px;cursor:pointer;transition:all 0.2s;font-family:var(--font)}
.welcome .tips button:hover{background:var(--surface3);border-color:var(--accent);color:var(--text)}
.composer{display:flex;gap:8px;padding:16px 20px;border-top:1px solid var(--border);flex-shrink:0}
.composer .wrap{display:flex;gap:8px;flex:1;align-items:center}
.composer input{flex:1;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border 0.2s;min-width:0}
.composer input:focus{border-color:var(--accent)}
.composer input::placeholder{color:var(--text2);opacity:0.5}
.composer .rbtn{display:flex;align-items:center;gap:5px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text3);font-size:12px;cursor:pointer;transition:all 0.2s;font-family:var(--font);white-space:nowrap;flex-shrink:0}
.composer .rbtn:hover{background:var(--surface3);border-color:var(--border-light);color:var(--text2)}
.composer .rbtn.on{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.composer .rbtn svg{width:14px;height:14px;flex-shrink:0}
.composer button{padding:12px 20px;background:var(--accent);border:none;border-radius:var(--radius-sm);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s;font-family:var(--font);display:flex;align-items:center;gap:6px;flex-shrink:0}
.composer button:hover{background:var(--accent-hover)}
.composer button:disabled{opacity:0.4;cursor:not-allowed}
.composer button .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.welcome{animation:slideUp 0.5s ease}
.sidebar-overlay{display:none}
@media(max-width:768px){
.sidebar{display:none;position:fixed;top:0;left:0;height:100dvh;width:260px;z-index:200}
.sidebar.open{display:flex}
.sidebar-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:199}
.sidebar-overlay.show{display:block}
.sidebar-toggle{display:flex!important}
.sidebar-header .brand{font-size:14px}
.msg .bubble{max-width:90%;font-size:13px}
}
.sidebar-toggle{display:none;background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;flex-shrink:0}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span>AIDA</span>
      </div>
      <button class="new-chat-btn" onclick="newChat()">+ Yangi</button>
    </div>
    <div style="padding:4px 12px;margin:4px 8px;border-radius:6px;background:var(--surface2);border:1px solid var(--border);">
      <a href="/code/" style="display:flex;align-items:center;gap:8px;padding:8px 4px;color:var(--accent);text-decoration:none;font-size:13px;font-weight:500;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        AIDA Code
      </a>
    </div>
    <div class="chat-list" id="chatList"></div>
  </aside>
  <div id="sidebarOverlay" class="sidebar-overlay"></div>
  <div class="main">
    <div class="header">
      <div style="display:flex;align-items:center;gap:10px;overflow:hidden">
        <button class="sidebar-toggle" id="sidebarToggle">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <span class="title" id="chatTitle">Yangi chat</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <a href="/code/" style="color:var(--accent);text-decoration:none;font-size:12px;font-weight:500;display:flex;align-items:center;gap:4px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Code
        </a>
        <div class="status"><span class="dot" id="dot"></span><span id="statusLabel">yuklanmoqda</span></div>
      </div>
    </div>
    <div class="chat-feed" id="chatFeed">
      <div class="welcome" id="welcome">
        <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div>
        <h1>AIDA — Sun'iy Ong</h1>
        <p>Men umumiy sun'iy ongman. Istalgan vazifani bajara olaman: kod, reja, tarjima, tahlil, internet qidiruv, fayllar bilan ishlash va boshqalar.</p>
        <div class="tips">
          <button onclick="sendMsg('Salom')">Salom</button>
          <button onclick="sendMsg('Menga html login formasi kodini yoz')">Kod</button>
          <button onclick="sendMsg('Python da yangi funksiya qosh')">Self-Modify</button>
          <button onclick="sendMsg('Internetdan AIDA haqida qidir')">Internet</button>
          <button onclick="sendMsg('Django vs FastAPI taqqosla')">Taqqoslash</button>
          <button onclick="window.open('/code/','_self')">Code</button>
        </div>
      </div>
    </div>
    <div class="composer">
      <div class="wrap">
        <button class="rbtn" id="researchBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span id="rbtnLabel">Internet</span>
        </button>
        <input type="text" id="input" placeholder="Xabar yozing..." autofocus>
        <button id="sendBtn">Yuborish</button>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
var feed = document.getElementById('chatFeed');
var input = document.getElementById('input');
var btn = document.getElementById('sendBtn');
var dot = document.getElementById('dot');
var statusLabel = document.getElementById('statusLabel');
var chatList = document.getElementById('chatList');
var chatTitle = document.getElementById('chatTitle');
var researchBtn = document.getElementById('researchBtn');
var rbtnLabel = document.getElementById('rbtnLabel');
var sidebar = document.getElementById('sidebar');
var overlay = document.getElementById('sidebarOverlay');
var toggleBtn = document.getElementById('sidebarToggle');

var welcome;
var researchOn = false;
var currentSessionId = '';
var sending = false;

function escapeHtml(t){var d=document.createElement('div');d.appendChild(document.createTextNode(t));return d.innerHTML}
function formatText(t){
  t=escapeHtml(t);
  t=t.replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\n/g,'<br>');
  return t
}

function sidebarOpen(){sidebar.classList.add('open');overlay.classList.add('show')}
function sidebarClose(){sidebar.classList.remove('open');overlay.classList.remove('show')}
toggleBtn.onclick=sidebarOpen;
overlay.onclick=sidebarClose;
researchBtn.onclick=toggleResearch;

function showWelcome(){
  var w='<div class="welcome" id="welcome"><div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div><h1>AIDA \u2014 Sun\'iy Ong</h1><p>Men umumiy sun\'iy ongman. Istalgan vazifani bajara olaman: kod, reja, tarjima, tahlil, internet qidiruv, fayllar bilan ishlash va boshqalar.</p><div class="tips"><button onclick="sendMsg(\'Salom\')">Salom</button><button onclick="sendMsg(\'Menga html login formasi kodini yoz\')">Kod</button><button onclick="sendMsg(\'Python da yangi funksiya qosh\')">Self-Modify</button><button onclick="sendMsg(\'Internetdan AIDA haqida qidir\')">Internet</button><button onclick="sendMsg(\'Django vs FastAPI taqqosla\')">Taqqoslash</button><button onclick="window.open(\'/code/\',\'_self\')">AIDA Code</button></div></div>';
  feed.innerHTML=w;
  welcome=document.getElementById('welcome')
}

function addMsg(role,text,sources){
  var w=document.getElementById('welcome');if(w)w.remove()
  var div=document.createElement('div');
  div.className='msg '+role;
  div.innerHTML='<div class="avatar">'+(role==='aida'?'A':'U')+'</div><div class="bubble">'+text+'</div>';
  if(sources&&sources.length){
    var s=div.querySelector('.bubble');
    var sd=document.createElement('div');
    sd.className='sources';
    sd.innerHTML='<strong>Manbalar:</strong>';
    sources.forEach(function(src){sd.innerHTML+='<a href="'+src.url+'" target="_blank" rel="noopener">'+src.title+'</a>'});
    s.appendChild(sd)
  }
  feed.appendChild(div);
  feed.scrollTop=feed.scrollHeight;
  return div
}

function setStatus(ok,label){dot.className='dot'+(ok?'':' off');statusLabel.textContent=label}

function toggleResearch(){
  researchOn=!researchOn;
  researchBtn.className='rbtn'+(researchOn?' on':'');
  rbtnLabel.textContent=researchOn?'On':'Internet'
}

function loadSessions(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET','/api/sessions/',true);
  xhr.timeout=5000;
  xhr.onload=function(){
    if(xhr.status===200){
      try{var d=JSON.parse(xhr.responseText);renderChatList(d.sessions||[])}catch(e){}
    }
  };
  xhr.send()
}

function renderChatList(sessions){
  var html='';
  if(!sessions||sessions.length===0){
    html='<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px">Hozircha chatlar yoq</div>'
  }else{
    sessions.forEach(function(s){
      var active=s.id===currentSessionId?' active':'';
      var title=escapeHtml(s.title||'Chat')||('Chat '+s.id.slice(-6));
      var date=s.last_activity?new Date(s.last_activity).toLocaleString('uz-UZ',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'';
      html+='<div class="chat-item'+active+'" onclick="switchChat(\''+s.id+'\')"><div>'+title+'</div>';
      if(date)html+='<div class="date">'+date+'</div>';
      html+='</div>'
    })
  }
  chatList.innerHTML=html
}

function switchChat(sessionId){
  currentSessionId=sessionId;
  sidebarClose();
  loadSessions();
  loadHistory(sessionId)
}

function loadHistory(sessionId){
  var xhr=new XMLHttpRequest();
  xhr.open('GET','/api/sessions/'+sessionId+'/history/',true);
  xhr.timeout=10000;
  xhr.onload=function(){
    if(xhr.status===200){
      try{
        var d=JSON.parse(xhr.responseText);
        feed.innerHTML='';
        var msgs=d.messages||[];
        if(msgs.length===0){
          showWelcome();
          return
        }
        msgs.forEach(function(m){addMsg(m.role==='user'?'user':'aida',formatText(m.content))});
        chatTitle.textContent=msgs[0]?msgs[0].content.slice(0,40)+'...':'Yangi chat'
      }catch(e){}
    }
  };
  xhr.send()
}

function newChat(){
  var xhr=new XMLHttpRequest();
  xhr.open('POST','/api/sessions/create/',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.timeout=5000;
  xhr.onload=function(){
    if(xhr.status===200){
      try{
        var d=JSON.parse(xhr.responseText);
        currentSessionId=d.session_id;
        showWelcome();
        chatTitle.textContent='Yangi chat';
        sidebarClose();
        loadSessions()
      }catch(e){}
    }
  };
  xhr.send(JSON.stringify({}))
}

function sendMsg(text){
  if(sending)return;
  var content=(text||input.value).trim();
  if(!content)return;
  if(!currentSessionId){
    currentSessionId='sess_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)
  }
  input.value='';
  addMsg('user',escapeHtml(content));
  sending=true;
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>';
  var msgDiv=addMsg('aida','');
  var bubble=msgDiv.querySelector('.bubble');
  var xhr=new XMLHttpRequest();
  xhr.open('POST','/api/chat/',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.timeout=120000;
  xhr.onload=function(){
    sending=false;
    btn.disabled=false;
    btn.innerHTML='Yuborish';
    if(xhr.status===200){
      try{
        var d=JSON.parse(xhr.responseText);
        bubble.innerHTML=d.message?formatText(d.message):'';
        if(d.sources&&d.sources.length){
          var sd=document.createElement('div');
          sd.className='sources';
          sd.innerHTML='<strong>Manbalar:</strong>';
          d.sources.forEach(function(s){sd.innerHTML+='<a href="'+s.url+'" target="_blank" rel="noopener">'+s.title+'</a>'});
          bubble.appendChild(sd)
        }
        if(d.status)setStatus(true,d.status.provider||'local');
        chatTitle.textContent=content.slice(0,40)+'...';
        loadSessions()
      }catch(e){bubble.innerHTML='Javobni oqishda xatolik.'}
    }else{
      try{var d=JSON.parse(xhr.responseText);bubble.innerHTML='Xatolik: '+escapeHtml(d.error||'Sorov bajarilmadi')}
      catch(e){bubble.innerHTML='Server xatosi (HTTP '+xhr.status+')'}
    }
    feed.scrollTop=feed.scrollHeight
  };
  xhr.onerror=function(){
    sending=false;
    btn.disabled=false;
    btn.innerHTML='Yuborish';
    bubble.innerHTML='Serverga ulanishda xatolik yuz berdi.';
    feed.scrollTop=feed.scrollHeight
  };
  xhr.send(JSON.stringify({prompt:content,research:researchOn,session_id:currentSessionId}))
}

function handleSend(){sendMsg()}
input.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend()}});

function checkStatus(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET','/api/status/',true);
  xhr.timeout=5000;
  xhr.onload=function(){
    if(xhr.status===200){
      try{var d=JSON.parse(xhr.responseText);setStatus(true,d.provider||'local')}catch(e){setStatus(true,'local')}
    }else{setStatus(false,'offline')}
  };
  xhr.onerror=function(){setStatus(false,'offline')};
  xhr.send()
}

checkStatus();
setInterval(checkStatus,15000);
showWelcome();
loadSessions();
window.sendMsg=sendMsg;
window.handleSend=handleSend;
window.toggleResearch=toggleResearch;
window.newChat=newChat;
window.switchChat=switchChat;
})();
</script>
</body>
</html>
